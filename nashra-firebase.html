<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>متحكم المسابقات - الجاخور</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a; --card: #141414; --accent: #c8a96e;
            --text: #f0ede8; --muted: #888; --danger: #ff6b6b; --success: #4ade80;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); direction: rtl; }
        
        .host-container { max-width: 500px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .session-info { background: var(--card); padding: 10px 15px; border-radius: 12px; border: 1px solid #222; }
        .session-code { color: var(--accent); font-weight: 900; font-size: 1.2rem; }

        .mode-selector { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .mode-btn { 
            background: var(--card); border: 1px solid #333; color: var(--muted); 
            padding: 15px 5px; border-radius: 12px; font-size: 0.8rem; font-weight: 700;
            cursor: pointer; transition: 0.2s;
        }
        .mode-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,169,110,0.1); }

        .control-panel { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #222; min-height: 300px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; font-weight: 700; }
        textarea, input, select { 
            width: 100%; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; 
            padding: 12px; color: white; font-family: inherit; font-size: 1rem;
        }

        .action-btn { 
            width: 100%; padding: 16px; border-radius: 12px; border: none; 
            font-weight: 800; font-size: 1rem; cursor: pointer; margin-top: 10px;
            transition: 0.2s;
        }
        .btn-start { background: var(--success); color: #052c14; }
        .btn-reset { background: var(--danger); color: #2c0505; margin-top: 20px; }

        .live-monitor { margin-top: 24px; }
        .monitor-title { font-size: 0.9rem; font-weight: 800; color: var(--accent); margin-bottom: 12px; display: flex; justify-content: space-between; }
        .player-row { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #1a1a1a; padding: 12px; border-radius: 10px; margin-bottom: 8px;
            border-right: 4px solid transparent;
        }
        .player-row.cheating { border-right-color: var(--danger); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .buzzer-list { margin-top: 15px; }
        .buzzer-item { 
            display: flex; align-items: center; gap: 10px; background: #222; 
            padding: 10px; border-radius: 10px; margin-bottom: 5px;
        }
        .rank { background: var(--accent); color: black; width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="host-container">
    <div class="header">
        <div>
            <h1 style="font-size: 1.2rem; font-weight: 900;">تحكم المسابقة 🎤</h1>
            <p id="player-count" style="font-size: 0.8rem; color: var(--muted);">المتصلين: 0</p>
        </div>
        <div class="session-info">
            <span style="font-size: 0.7rem; display: block; color: var(--muted);">كود الغرفة</span>
            <span class="session-code">J-2024</span>
        </div>
    </div>

    <div class="mode-selector">
        <button class="mode-btn active" onclick="setMode('classic')">كلاسيكي</button>
        <button class="mode-btn" onclick="setMode('sprint')">المسار</button>
        <button class="mode-btn" onclick="setMode('speed')">سباق السرعة</button>
    </div>

    <div class="control-panel">
        <div id="mode-ui">
            </div>
    </div>

    <div class="live-monitor">
        <div class="monitor-title">
            <span>مراقبة اللاعبين (عين الصقر 👁️)</span>
            <span id="anti-cheat-status" style="font-size: 0.7rem;">الكل ملتزم ✅</span>
        </div>
        <div id="players-monitor-list">
            </div>
    </div>

    <button class="action-btn btn-reset" onclick="resetFullSession()">تصفير الجلسة بالكامل ⚠️</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
// --- إعدادات Firebase الخاصة بك ---
const firebaseConfig = {
    apiKey: "AIzaSyAM7ytV178WL4koEKRrijrJpWlUwoX0vwE",
    authDomain: "janjfa-score.firebaseapp.com",
    databaseURL: "https://janjfa-score-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "janjfa-score"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentMode = 'classic';
const sessionID = "J-2024"; // يمكنك جعلها عشوائية

function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    renderControlUI();
    db.ref(`quiz/${sessionID}/config`).update({ mode: mode, status: 'waiting' });
}

function renderControlUI() {
    const container = document.getElementById('mode-ui');
    if (currentMode === 'classic') {
        container.innerHTML = `
            <div class="input-group">
                <label>السؤال الحالي</label>
                <textarea id="q-text" placeholder="اكتب السؤال هنا..."></textarea>
            </div>
            <div class="input-group">
                <label>وقت الإجابة (ثانية)</label>
                <input type="number" id="q-time" value="20">
            </div>
            <button class="action-btn btn-start" onclick="startClassicQuestion()">إرسال السؤال للكل 🚀</button>
        `;
    } else if (currentMode === 'speed') {
        container.innerHTML = `
            <div class="input-group">
                <label>وضع سباق السرعة</label>
                <p style="font-size:0.8rem; color:var(--muted)">عند الضغط، سيظهر زر (جاوب) عند الجميع فوراً.</p>
            </div>
            <button class="action-btn btn-start" style="background:var(--danger); color:white;" onclick="openBuzzers()">افتح البوزر الآن 🚨</button>
            <div id="buzzer-results" class="buzzer-list"></div>
        `;
    }
}

// دالة فتح البوزر (وضع السرعة)
async function openBuzzers() {
    await db.ref(`quiz/${sessionID}/state`).set({
        status: 'buzzer_open',
        timestamp: Date.now(),
        buzzes: []
    });
    document.getElementById('buzzer-results').innerHTML = '<p style="text-align:center; padding:20px;">انتظار أول ضغطة...</p>';
}

// مراقبة الضغطات في وضع السرعة
db.ref(`quiz/${sessionID}/state/buzzes`).on('value', snap => {
    if (currentMode !== 'speed' || !snap.exists()) return;
    const buzzes = Object.values(snap.val()).sort((a,b) => a.time - b.time);
    const res = document.getElementById('buzzer-results');
    res.innerHTML = buzzes.map((b, i) => `
        <div class="buzzer-item">
            <span class="rank">${i+1}</span>
            <span style="flex:1; font-weight:700;">${b.name}</span>
            <span style="font-size:0.7rem; color:var(--muted)">+${((b.time - buzzes[0].time)/1000).toFixed(2)}s</span>
        </div>
    `).join('');
});

// مراقبة اللاعبين وحالة الغش
db.ref(`quiz/${sessionID}/players`).on('value', snap => {
    const players = snap.exists() ? Object.values(snap.val()) : [];
    document.getElementById('player-count').textContent = `المتصلين: ${players.length}`;
    
    const monitor = document.getElementById('players-monitor-list');
    monitor.innerHTML = players.map(p => `
        <div class="player-row ${p.isCheating ? 'cheating' : ''}">
            <span>${p.name}</span>
            <span>${p.isCheating ? '⚠️ غادر الصفحة' : '✅ ملتزم'}</span>
        </div>
    `).join('');
});

function resetFullSession() {
    if(confirm('هل تريد مسح كل البيانات وتصفير الجلسة؟')) {
        db.ref(`quiz/${sessionID}`).remove();
        location.reload();
    }
}

// تشغيل الواجهة الافتراضية
renderControlUI();
</script>
</body>
</html>
